# =============================================================================
# Mary Kitchen – example Nginx reverse proxy for Django (e.g. Gunicorn)
# =============================================================================
# Copy to the server, e.g.:
#   sudo cp mary-kitchen.example.conf /etc/nginx/sites-available/mary-kitchen
#   sudo ln -sf /etc/nginx/sites-available/mary-kitchen /etc/nginx/sites-enabled/
#
# Test and reload:
#   sudo nginx -t && sudo systemctl restart nginx
#
# Verification (Django): temporarily log
#   request.META.get("HTTP_X_FORWARDED_FOR")
# Expected: real client IP (or left-most in the chain), not 127.0.0.1 alone
# when you are not on the same machine as the proxy.
# =============================================================================

upstream django_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# --- HTTP (redirect to HTTPS in production, or proxy directly in dev) --------
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    location / {
        proxy_pass http://django_app;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Required for django-axes, django-ratelimit, and SECURE_PROXY_SSL_HEADER
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- HTTPS (recommended) ------------------------------------------------------
# Uncomment and set ssl_certificate paths after you have certs (e.g. Let's Encrypt).
