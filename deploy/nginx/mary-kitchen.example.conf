# =============================================================================
# OPTIONAL – Cloudflare (only if traffic comes from Cloudflare to Nginx)
# =============================================================================
# Prefer CF-Connecting-IP as the true client when Nginx sees Cloudflare IPs.
# You must list Cloudflare IP ranges (see https://www.cloudflare.com/ips/).
#
# set_real_ip_from 173.245.48.0/20;
# # ... add all published IPv4/IPv6 ranges ...
# real_ip_header CF-Connecting-IP;
#
# With production Django settings you may also set:
#   AXES_META_PRECEDENCE_ORDER to prefer CF-Connecting-IP if needed.
# =============================================================================
